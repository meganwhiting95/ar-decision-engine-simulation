
<style>
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#sim{width:100%;padding:12px 0 16px}
.ctrl-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}

.scene-label{font-size:12px;color:var(--color-text-secondary);flex:1;text-align:right}

.screen{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;min-height:400px;position:relative}
.caption-bar{background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);padding:10px 16px;font-size:12px;color:var(--color-text-secondary);min-height:42px;display:flex;align-items:center;gap:8px}
.caption-bar i{font-size:15px;color:var(--color-text-secondary);flex-shrink:0}

.xltb{background:#1e3a5f;padding:8px 14px;display:flex;align-items:center;gap:10px}
.xldots{display:flex;gap:5px}
.xldot{width:9px;height:9px;border-radius:50%}
.xlfn{font-size:11px;color:rgba(255,255,255,.75);font-family:var(--font-mono)}
.xlbadge{margin-left:auto;background:rgba(255,255,255,.15);font-size:10px;color:#93c5fd;padding:2px 7px;border-radius:4px;font-family:var(--font-mono)}
.xltabs{background:#16213a;display:flex;gap:2px;padding:0 8px;border-bottom:0.5px solid rgba(255,255,255,.08);overflow-x:auto}
.xltab{padding:6px 12px;font-size:11px;color:#64748b;border-radius:5px 5px 0 0;white-space:nowrap;font-weight:500}
.xltab.on{background:#1e3a5f;color:#93c5fd;border:0.5px solid rgba(255,255,255,.1);border-bottom:none}
.xltab.grn{color:#4ade80}
.xlbody{background:#f8f9fa;color:#1e293b;padding:0}

.hdr-strip{background:#1a2744;color:#fff;padding:10px 16px;font-size:13px;font-weight:700}
.hint-strip{background:#dbeafe;color:#1e40af;padding:5px 16px;font-size:10px;font-style:italic}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#2563eb;color:#fff;padding:6px 10px;text-align:left;font-weight:600;white-space:nowrap;border-right:0.5px solid rgba(255,255,255,.15)}
.tbl td{padding:5px 10px;border-bottom:0.5px solid #e2e8f0;border-right:0.5px solid #e2e8f0;white-space:nowrap}
.tbl tr:nth-child(even) td{background:#f1f5f9}
.pill{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700}
.pill-red{background:#fee2e2;color:#dc2626}
.pill-amb{background:#fef3c7;color:#92400e}
.pill-grn{background:#dcfce7;color:#166534}
.pill-blu{background:#dbeafe;color:#1e40af}

.macro-dlg{background:#fff;border:0.5px solid #cbd5e1;border-radius:5px;margin:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.macro-title{background:#1a4d8f;color:#fff;padding:7px 12px;font-size:11px;font-weight:700}
.macro-body{padding:12px;display:flex;gap:12px}
.macro-list{flex:1;border:0.5px solid #cbd5e1;border-radius:3px;overflow:hidden;font-size:11px}
.mi{padding:6px 10px;color:#374151;border-bottom:0.5px solid #e5e7eb;cursor:default}
.mi.sel{background:#dbeafe;color:#1d4ed8;font-weight:700}
.macro-btns{display:flex;flex-direction:column;gap:5px}
.mbtn{padding:5px 14px;border-radius:3px;font-size:11px;font-weight:700;cursor:default;border:0.5px solid}
.mbtn-run{background:#2563eb;color:#fff;border-color:#1d4ed8}
.mbtn-can{background:#fff;color:#374151;border-color:#cbd5e1}

.prog-wrap{background:#fff;margin:12px;border-radius:6px;border:0.5px solid #e2e8f0;padding:14px}
.prog-outer{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:8px 0}
.prog-inner{height:100%;background:#2563eb;border-radius:999px;transition:width .5s ease}
.pstep{font-size:11px;display:flex;align-items:center;gap:7px;padding:3px 0;color:#94a3b8}
.pstep.done{color:#16a34a}
.pstep.act{color:#2563eb;font-weight:500}

.res-banner{background:#1a2744;color:#fff;padding:12px 16px;font-size:14px;font-weight:800}
.res-sub{background:#dbeafe;color:#1e40af;padding:5px 16px;font-size:10px;font-style:italic}
.res-selrow{background:#f8fafc;padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #e2e8f0}
.res-sel-lbl{background:#2563eb;color:#fff;padding:5px 12px;font-size:11px;font-weight:700;border-radius:3px}
.res-val-box{border:2px solid #f59e0b;background:#fffbeb;padding:4px 10px;font-size:12px;font-weight:700;border-radius:3px;color:#1e293b;min-width:120px;font-family:var(--font-mono)}
.typing{overflow:hidden;white-space:nowrap;border-right:2px solid #2563eb;animation:typ .8s steps(20) forwards,blk .6s step-end infinite}
@keyframes typ{from{width:0}to{width:100%}}
@keyframes blk{50%{border-color:transparent}}
.sec-head{padding:7px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff}
.sec-blue{background:#2563eb}.sec-grn{background:#16a34a}.sec-amb{background:#d97706}
.rgrid{display:grid;grid-template-columns:1fr 1fr}
.rcell{padding:7px 12px;border-bottom:0.5px solid #e5e7eb;border-right:0.5px solid #e5e7eb}
.rlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-bottom:2px}
.rval{font-size:11px;font-weight:600;color:#1e293b;line-height:1.4}
.rval.blu{color:#2563eb}.rval.red{color:#dc2626;font-weight:800}.rval.grn{color:#16a34a}.rval.amb{color:#d97706}
.rfull{padding:7px 12px;border-bottom:0.5px solid #e5e7eb;grid-column:1/-1}
.rwf{font-size:10px;color:#374151;line-height:1.7;white-space:pre-line}
.rdisc{background:#fff7ed;border-top:0.5px solid #fed7aa;padding:6px 12px;font-size:9px;color:#c2410c;font-style:italic;grid-column:1/-1}

.override-box{margin:12px;background:#fffbeb;border:0.5px solid #f59e0b;border-radius:6px;padding:12px;font-size:11px}
.override-title{font-weight:700;color:#92400e;margin-bottom:6px;font-size:12px}
.override-row{display:flex;align-items:flex-start;gap:8px;margin:4px 0;color:#374151}
.override-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:#fff}

.done-box{padding:24px 20px;text-align:center}
.done-icon{font-size:36px;margin-bottom:10px;color:#16a34a}
.done-h{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.done-p{font-size:13px;color:var(--color-text-secondary);line-height:1.6;max-width:420px;margin:0 auto 16px}
.done-list{text-align:left;display:flex;flex-direction:column;gap:6px;max-width:360px;margin:0 auto}
.ditem{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--color-text-secondary)}
.dck{color:#16a34a;font-size:13px;flex-shrink:0;margin-top:1px}

.cursor{display:inline-block;width:2px;height:12px;background:#2563eb;vertical-align:middle;animation:cur .7s step-end infinite}
@keyframes cur{50%{opacity:0}}
.highlight-row td{background:#fffbeb !important}
.flash{animation:fsh .6s ease}
@keyframes fsh{0%,100%{opacity:1}50%{opacity:.3}}
</style>

let cur=0, timer=null, playing=false, elapsed=0, tickMs=80

function render(idx){
  const s=SCENES[idx]
  document.getElementById('screen').innerHTML=s.render()
  document.getElementById('caption').textContent=s.caption
  document.getElementById('sceneLbl').textContent=`Scene ${idx+1} of ${SCENES.length}`
  const pct=Math.round((idx/SCENES.length)*100)
  document.getElementById('pFill').style.width=pct+'%'
}

function togglePlay(){
  playing=!playing
  const btn=document.getElementById('btnPlay')
  if(playing){
    btn.innerHTML='<i class="ti ti-player-pause" aria-hidden="true"></i> Pause'
    tick()
  } else {
    btn.innerHTML='<i class="ti ti-player-play" aria-hidden="true"></i> Play'
    clearTimeout(timer)
  }
}

function tick(){
  if(!playing) return
  elapsed+=tickMs
  if(elapsed>=SCENES[cur].dur){
    elapsed=0
    cur++
    if(cur>=SCENES.length){
      cur=SCENES.length-1
      playing=false
      document.getElementById('btnPlay').innerHTML='<i class="ti ti-player-play" aria-hidden="true"></i> Play'
      document.getElementById('pFill').style.width='100%'
      return
    }
    render(cur)
  }
  timer=setTimeout(tick, tickMs)
}

function restart(){
  clearTimeout(timer)
  playing=false
  cur=0; elapsed=0
  document.getElementById('btnPlay').innerHTML='<i class="ti ti-player-play" aria-hidden="true"></i> Play'
  render(0)
  document.getElementById('pFill').style.width='0%'
}

function skipTo(idx){
  clearTimeout(timer)
  elapsed=0; cur=idx
  render(cur)
  if(playing) tick()
}

render(0)
</script>
